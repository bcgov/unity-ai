name: SonarCloud Analysis

on:
  push:
    branches:
      - dev2
      - dev
      - test
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'main' || github.ref_name == 'test' && 'test' || 'dev' }}
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: applications/Unity.AI.Reporting.Frontend/package-lock.json

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install Python dependencies
        working-directory: ./applications/Unity.AI.Reporting.Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js dependencies
        working-directory: ./applications/Unity.AI.Reporting.Frontend
        run: npm ci

      - name: Build Angular frontend
        working-directory: ./applications/Unity.AI.Reporting.Frontend
        run: npm run build

      - name: Set version for SonarCloud
        run: |
          VERSION="${{ vars.AI_BUILD_VERSION }}"
          echo "Debug: AI_BUILD_VERSION variable value: '$VERSION'"
          if [ -z "$VERSION" ]; then
            echo "BUILD_VERSION=1.0.0-dev" >> $GITHUB_ENV
            echo "Using fallback version: 1.0.0-dev (AI_BUILD_VERSION variable not set)"
          else
            echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Using project version: $VERSION"
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}