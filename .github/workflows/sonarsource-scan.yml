name: SonarCloud Analysis

on:
  push:
    branches:
      - dev2
      - dev
      - test
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'main' || github.ref_name == 'test' && 'test' || 'dev' }}
    permissions:
      contents: read
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: applications/Unity.AI.Reporting.Frontend/package-lock.json

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install Python dependencies
        working-directory: ./applications/Unity.AI.Reporting.Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install Node.js dependencies
        working-directory: ./applications/Unity.AI.Reporting.Frontend
        run: npm ci --no-audit --prefer-offline

      - name: Build Angular frontend
        working-directory: ./applications/Unity.AI.Reporting.Frontend
        run: npm run build

      - name: Set version for SonarCloud
        run: |
          VERSION="${{ vars.UAI_BUILD_VERSION }}"
          echo "Debug: UAI_BUILD_VERSION variable value: '$VERSION'"
          if [ -n "$VERSION" ]; then
            echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Using project version: $VERSION"
            # Replace ${BUILD_VERSION} with actual value
            sed -i "s/\${BUILD_VERSION}/$VERSION/g" applications/sonar-project.properties
          else
            echo "UAI_BUILD_VERSION variable not set - removing sonar.projectVersion property"
            # Remove the projectVersion line entirely if no version is available
            sed -i "/sonar.projectVersion=/d" applications/sonar-project.properties
          fi

      - name: SonarCloud sonar.projectVersion configuration
        run: |
          echo "BUILD_VERSION environment variable: $BUILD_VERSION"
          echo "Updated sonar-project.properties:"
          cat applications/sonar-project.properties | grep "sonar.projectVersion"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: applications
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}