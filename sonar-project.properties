# SonarCloud configuration for Unity AI Platform
sonar.projectKey=bcgov_unity-ai
sonar.organization=bcgov-sonarcloud
sonar.host.url=https://sonarcloud.io

# Project metadata
sonar.projectName=Unity-AI
sonar.projectDescription=AI-powered reporting and assessment platform for Unity Grant Manager

# Source code settings
sonar.sources=applications/Unity.AI.Reporting.Backend/src,applications/Unity.AI.Reporting.Frontend/src
sonar.tests=applications/Unity.AI.Reporting.Backend/test_packages.py

# Quality gate settings
sonar.qualitygate.wait=true

# Language-specific settings
sonar.python.version=3.13
sonar.typescript.node=20

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.min.js,**/*.bundle.js,**/coverage/**,**/__pycache__/**,**/*.pyc,applications/Unity.AI.Reporting.Frontend/src/environments/**

# Test exclusions
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/__pycache__/**

# Coverage analysis explicitly disabled (excludes all files from coverage)
sonar.coverage.exclusions=**/*

# Code duplication exclusions
sonar.cpd.exclusions=**/*.html,**/*.css,**/*.scss,**/*.min.js,**/*.spec.ts,**/*.spec.js,**/*

# SCM settings
sonar.scm.provider=git